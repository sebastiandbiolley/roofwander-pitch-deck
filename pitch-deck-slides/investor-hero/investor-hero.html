<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roofwander — Investor Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/deck.css" />
<style>
.hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;padding:48px 24px;max-width:960px;margin:0 auto}
.hero-inner{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;width:100%}
@media (max-width:900px){
.hero-inner{grid-template-columns:1fr;gap:36px;text-align:center}
}
/* Left column */
.hero-content{}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.heading{font-size:clamp(32px,4vw,44px);font-weight:700;line-height:1.1;letter-spacing:-0.03em;margin-bottom:12px}
.tagline{font-size:16px;font-weight:400;color:var(--text-muted);line-height:1.5;margin-bottom:28px}
/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.pill{display:inline-flex;align-items:center;padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;color:var(--text);box-shadow:var(--shadow);transition:all 0.2s}
.pill:hover{border-color:#a8a29e;box-shadow:var(--shadow-hover)}
@media (max-width:900px){.pills{justify-content:center}}
/* CTA */
.cta-wrap{margin-bottom:24px}
.disclosure{border:1px solid var(--border);border-radius:10px;background:#fff;box-shadow:var(--shadow);overflow:hidden;max-width:420px}
@media (max-width:900px){.disclosure{margin:0 auto}}
.disclosure-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;font-size:14px;font-weight:500;color:var(--text);background:none;border:none;cursor:pointer;text-align:left;transition:background 0.2s}
.disclosure-trigger:hover{background:#fafaf9}
.disclosure-icon{transition:transform 0.3s;color:var(--text-muted)}
.disclosure.open .disclosure-icon{transform:rotate(180deg)}
.disclosure-content{padding:0 18px;max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.disclosure.open .disclosure-content{max-height:120px}
.disclosure-body{padding:8px 0 18px;font-size:14px;color:var(--text-muted)}
.disclosure-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f4}
.disclosure-row:last-child{border-bottom:none}
.disclosure-label{font-weight:500;color:var(--text)}
.cta{display:inline-flex;align-items:center;padding:14px 28px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;text-decoration:none;border-radius:10px;box-shadow:0 2px 8px rgba(22,101,52,0.25);transition:all 0.2s}
.cta:hover{background:#14532d;box-shadow:0 4px 16px rgba(22,101,52,0.3);transform:translateY(-1px)}
@media (max-width:900px){.cta-wrap{text-align:center}}
/* Right column - Phone mockup */
.hero-visual{position:relative;display:flex;justify-content:center;align-items:center;min-height:300px}
@media (max-width:900px){.hero-visual{order:-1;min-height:240px}}
.phone-wrap{position:relative;opacity:0;transform:translateY(50px);animation:phoneEnter 2.5s cubic-bezier(0.16,1,0.3,1) 0.2s forwards,float 6s ease-in-out 2.7s infinite}
@keyframes phoneEnter{to{opacity:1;transform:translateY(0)}}
.circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:380px;height:380px;border-radius:50%;background:linear-gradient(135deg,var(--accent-light) 0%,#bbf7d0 100%);opacity:0.9}
@media (max-width:600px){.circle{width:280px;height:280px}}
.phone{position:relative;z-index:1;width:210px;height:420px;background:#1a1a1a;border-radius:32px;padding:10px;box-shadow:0 20px 40px rgba(0,0,0,0.15)}
@media (max-width:600px){.phone{width:180px;height:360px;border-radius:28px;padding:8px}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.phone-screen{width:100%;height:100%;background:#fff;border-radius:24px;overflow:hidden;position:relative}
@media (max-width:600px){.phone-screen{border-radius:22px}}
.phone-video{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);min-width:150%;min-height:150%;width:auto;height:auto;object-fit:cover;pointer-events:none}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:20px;background:#1a1a1a;border-radius:0 0 11px 11px;z-index:2}
@media (max-width:600px){.phone-notch{width:70px;height:18px}}
/* Self-hosted video - 9:16 portrait fills phone screen */
.video-container{position:absolute;inset:0;background:linear-gradient(145deg,#1a2e1a 0%,#0a0a0a 100%);overflow:hidden}
.video-container video{position:absolute;top:50%;left:50%;min-width:100%;min-height:100%;width:auto;height:auto;object-fit:cover;transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>

<section class="hero">
<div class="hero-inner">

<div class="hero-content">
<p class="eyebrow">Investor Overview</p>
<h1 class="heading">Roofwander</h1>
<p class="tagline">The rooftop tent marketplace shaping how people rent, experience, and decide.</p>
<div class="pills">
<span class="pill">Sharing economy</span>
<span class="pill">Try-before-you-buy</span>
<span class="pill">Rental + affiliate model</span>
</div>
<div class="cta-wrap">
<a class="cta" href="https://roofwander.com" target="_blank" rel="noopener">Explore the marketplace</a>
</div>
<div class="disclosure" id="about-disclosure">
<button class="disclosure-trigger" type="button" aria-expanded="false" aria-controls="about-content" id="about-trigger">
About Roofwander
<span class="disclosure-icon">▾</span>
</button>
<div class="disclosure-content" id="about-content" role="region">
<div class="disclosure-body">
<div class="disclosure-row"><span class="disclosure-label">Founded</span><span>2025, 7 October</span></div>
<div class="disclosure-row"><span class="disclosure-label">Headquarters</span><span>Brussels</span></div>
<div class="disclosure-row"><span class="disclosure-label">Team</span><span>3 founders</span></div>
<div class="disclosure-row"><span class="disclosure-label">Stage</span><span>Marketplace live</span></div>
</div>
</div>
</div>
</div>

<div class="hero-visual">
<div class="circle"></div>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="video-container">
<video autoplay muted loop playsinline poster="hero-poster.webp">
  <source src="hero-video.mp4" type="video/mp4" />
</video>
</div>
</div>
</div>
</div>
</div>

</div>
</section>

<script>
(function(){
  const trigger=document.getElementById('about-trigger')
  const disclosure=document.getElementById('about-disclosure')
  if(!trigger||!disclosure)return
  trigger.addEventListener('click',()=>{
    const open=disclosure.classList.toggle('open')
    trigger.setAttribute('aria-expanded',open)
  })

})()
</script>
</body>
</html>
