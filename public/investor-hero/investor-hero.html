<!DOCTYPE html>
<html lang="en">
<head>
<base href="../" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roofwander — Investor Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/deck.css" />
</head>
<body>

<section class="deck-section deck-hero">
<div class="deck-hero-inner">

<div class="deck-hero-content">
<p class="deck-eyebrow">Investor Overview</p>
<h1 class="deck-title">Roofwander</h1>
<p class="deck-desc">The rooftop tent marketplace shaping how people rent, experience, and decide.</p>
<div class="cta-wrap">
<a class="cta" href="https://roofwander.com" target="_blank" rel="noopener">Explore the marketplace</a>
</div>
<div class="disclosure" id="about-disclosure">
<button class="disclosure-trigger" type="button" aria-expanded="false" aria-controls="about-content" id="about-trigger">
About Roofwander
<span class="disclosure-icon rw-icon" aria-hidden="true"><svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <path d="m6 9 6 6 6-6" />
</svg></span>
</button>
<div class="disclosure-content" id="about-content" role="region">
<div class="disclosure-body">
<div class="disclosure-row"><span class="disclosure-label">Founded</span><span>2025, 7 October</span></div>
<div class="disclosure-row"><span class="disclosure-label">Headquarters</span><span>Brussels</span></div>
<div class="disclosure-row"><span class="disclosure-label">Team</span><span>3 founders</span></div>
<div class="disclosure-row"><span class="disclosure-label">Stage</span><span>Marketplace live</span></div>
</div>
</div>
</div>
</div>

<div class="deck-hero-visual">
<div class="circle"></div>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="video-container">
<video autoplay muted loop playsinline poster="investor-hero/hero-poster.webp">
  <source src="investor-hero/hero-video.mp4" type="video/mp4" />
</video>
</div>
</div>
</div>
</div>
</div>

</div>
</section>

<script src="assets/deck-behaviors.js" defer></script>
</body>
</html>
