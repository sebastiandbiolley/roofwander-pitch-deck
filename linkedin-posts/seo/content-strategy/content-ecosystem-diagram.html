<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketplace SEO Content Ecosystem</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f6f8;margin:0;padding:24px;color:#111}
.container{max-width:1000px;margin:auto}
h1{font-size:28px;margin:0 0 6px;line-height:1.2}
p{color:#555;font-size:14px;margin:0}
.card{background:white;border-radius:12px;padding:16px 20px;margin-top:14px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.box{background:#fff;border:1px solid #dcdcdc;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px}
.arrow{font-size:18px;color:#888}
.diagram{text-align:center;margin-top:6px}
.diagram-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:4px 0}
.diagram-row.three{flex-wrap:wrap}
.diagram-row.center .box,.diagram-row.center .arrow-v{margin:0 auto}
.arrow-v{font-size:20px;color:#888;line-height:1}
.center-box{background:#f8f9fa;border-color:#bbb}
@media print{
@page{size:A4 landscape;margin:10mm}
body{background:white;padding:6px;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:11px}
.container{max-width:100%}
h1{font-size:22px;margin-bottom:4px}
p{font-size:12px}
.card{padding:10px 14px;margin-top:8px;box-shadow:none;border-radius:8px}
.box{padding:8px 12px;font-size:12px}
}
</style>
</head>

<body>
<div class="container">

<h1>Marketplace SEO Content Ecosystem</h1>
<p>Listings at the core, supported by other content types that capture different search intents.</p>

<div class="card">
<div class="diagram">
<div class="diagram-row center"><div class="box">Guides</div></div>
<div class="diagram-row center"><div class="arrow-v">↑</div></div>
<div class="diagram-row three">
<div class="box">Brand pages</div>
<div class="arrow">→</div>
<div class="box center-box">Listings</div>
<div class="arrow">←</div>
<div class="box">Location pages</div>
</div>
<div class="diagram-row center"><div class="arrow-v">↓</div></div>
<div class="diagram-row center"><div class="box">Blog</div></div>
</div>
</div>

</div>
</body>
</html>
