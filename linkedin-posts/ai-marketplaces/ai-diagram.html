<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Impact: SaaS vs Marketplaces</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f6f8;margin:0;padding:24px;color:#111}
.container{max-width:1000px;margin:auto}
h1{font-size:28px;margin:0 0 6px;line-height:1.2}
p{color:#555;font-size:14px;margin:0}
.card{background:white;border-radius:12px;padding:16px 20px;margin-top:14px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.compare{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:10px;flex-wrap:wrap}
.column{flex:1;min-width:220px;max-width:320px}
.column-title{font-weight:700;font-size:16px;margin-bottom:8px;color:#333}
.column-title.saas{color:#2563eb}
.column-title.mp{color:#059669}
.list{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px}
.list-item{border:1px solid #dcdcdc;border-radius:8px;padding:10px 14px;font-size:14px;color:#334155;background:#fafafa}
.arrow-down{font-size:24px;color:#888}
@media print{
@page{size:A4 landscape;margin:10mm}
body{background:white;padding:6px;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:11px}
.container{max-width:100%}
h1{font-size:22px;margin-bottom:4px}
p{font-size:12px}
.card{padding:10px 14px;margin-top:8px;box-shadow:none;border-radius:8px}
.compare{gap:16px}
.list-item{padding:8px 12px;font-size:12px}
}
</style>
</head>

<body>
<div class="container">

<h1>AI Impact: SaaS vs Marketplaces</h1>
<p>How AI transforms software vs networks of supply and demand.</p>

<div class="card">
<div class="compare">
<div class="column">
<div class="column-title saas">SaaS</div>
<div class="list">
<div class="list-item">AI automates tasks</div>
<div class="list-item">AI replaces tools</div>
<div class="list-item">AI generates content</div>
<div class="list-item">AI analyzes data</div>
</div>
</div>
<div class="arrow-down">↓</div>
<div class="column">
<div class="column-title mp">Marketplaces</div>
<div class="list">
<div class="list-item">AI improves discovery</div>
<div class="list-item">AI improves matching</div>
<div class="list-item">AI helps create listings</div>
<div class="list-item">AI improves search</div>
</div>
</div>
</div>
</div>

</div>
</body>
</html>
